<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>診断結果｜夜の価値観タイプ</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="result-wrapper">

  <p class="result-eyebrow">Your Night Type</p>

  <div class="result-card">
    <div class="type-label">Type</div>
    <div id="typeName" class="type-name"></div>
    <div class="divider"></div>
    <p id="leadText" class="lead"></p>

    <div class="compat-section">
      <p class="compat-label good">◇ 相性がいいタイプ</p>
      <ul id="goodList" class="compat-list good-list"></ul>
    </div>

    <div class="compat-section">
      <p class="compat-label bad">◇ 刺激が強すぎるタイプ</p>
      <ul id="badList" class="compat-list bad-list"></ul>
    </div>
  </div>

  <button class="back-btn" onclick="location.href='index.html'">
    もう一度診断する
  </button>

</div>

<script src="./types.js"></script>
<script>
const scores = JSON.parse(localStorage.getItem('nightTypeScores'));
if(!scores){
  document.getElementById('typeName').textContent = '診断データが見つかりません';
} else {
  const resultType = Object.keys(scores).reduce((a,b)=> scores[a]>scores[b]?a:b);
  const data = types[resultType];
  document.getElementById('typeName').textContent = data.name;
  document.getElementById('leadText').textContent = data.description;
  data.good.forEach(code=>{
    const li = document.createElement('li');
    li.textContent = types[code].name;
    document.getElementById('goodList').appendChild(li);
  });
  data.bad.forEach(code=>{
    const li = document.createElement('li');
    li.textContent = types[code].name;
    document.getElementById('badList').appendChild(li);
  });
}
</script>

<script>
(function(){
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  function init(){
    stars=[];
    for(let i=0;i<160;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*0.9+0.1,a:Math.random(),speed:Math.random()*0.003+0.001});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{ s.a+=s.speed; const alpha=(Math.sin(s.a)+1)/2*0.7+0.1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(220,210,180,${alpha})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize',()=>{ resize(); init(); });
})();
</script>
</body>
</html>
