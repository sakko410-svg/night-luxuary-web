<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夜の価値観タイプ診断</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="container">

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line right"></div>
  </div>

  <p class="eyebrow">Night Values Type</p>

  <h1>夜の<em>価値観</em><br>タイプ診断</h1>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressText">0 / 32</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="question-card">
    <div class="question-number" id="questionNumber">Question 01</div>
    <p id="question">読み込み中...</p>
  </div>

  <div class="buttons">
    <button id="yesBtn">かなり当てはまる</button>
    <button id="noBtn">あまり当てはまらない</button>
  </div>

</div>

<script src="./questions.js"></script>
<script src="./script.js"></script>

<script>
// Stars
(function(){
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function init(){
    stars = [];
    for(let i=0;i<160;i++){
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*0.9+0.1,
        a: Math.random(),
        speed: Math.random()*0.003+0.001
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.a += s.speed;
      const alpha = (Math.sin(s.a)+1)/2 * 0.7 + 0.1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(220,210,180,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  init();
  draw();
  window.addEventListener('resize',()=>{ resize(); init(); });
})();
</script>
</body>
</html>
