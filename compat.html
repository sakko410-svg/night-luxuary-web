<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>相性チェック｜NightType</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="noise"></div>

<nav class="navbar">
  <a href="index.html" class="nav-logo">NightType</a>
  <button class="hamburger" id="hamburger" aria-label="menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html"><span class="icon">🌙</span>診断する</a>
  <a href="compat.html" class="active"><span class="icon">💜</span>相性チェック</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<div class="page">
  <div class="compat-page">

    <div class="page-header">
      <h1>相性チェック</h1>
      <p>2つのタイプを選んで相性を確認しよう</p>
    </div>

    <p class="selector-label">① 自分のタイプを選ぶ</p>
    <div class="type-grid" id="grid1"></div>

    <p class="selector-label" style="animation-delay:0.4s">② 相手のタイプを選ぶ</p>
    <div class="type-grid" id="grid2"></div>

    <!-- 結果 -->
    <div class="compat-result" id="compatResult">
      <div class="cr-pair">
        <div class="cr-type">
          <span class="icon" id="crIcon1">🌙</span>
          <span class="name" id="crName1">—</span>
        </div>
        <div class="cr-arrow">⟷</div>
        <div class="cr-type">
          <span class="icon" id="crIcon2">🌙</span>
          <span class="name" id="crName2">—</span>
        </div>
      </div>

      <div class="cr-score">
        <div class="hearts" id="crHearts">💜💜💜</div>
        <div class="label" id="crLabel">相性スコア</div>
      </div>

      <p class="cr-comment" id="crComment">—</p>
    </div>

  </div>
</div>

<script src="./types.js"></script>
<script>
const typeKeys = Object.keys(types);
let sel1 = null, sel2 = null;

const heartMap = {
  5: { hearts: '💜💜💜💜💜', label: '最高の相性 ★★★★★' },
  4: { hearts: '💜💜💜💜🤍', label: 'とても良い相性 ★★★★☆' },
  3: { hearts: '💜💜💜🤍🤍', label: '普通の相性 ★★★☆☆' },
  2: { hearts: '💜💜🤍🤍🤍', label: '少し難しい ★★☆☆☆' },
  1: { hearts: '💜🤍🤍🤍🤍', label: '刺激が強い ★☆☆☆☆' }
};

function buildGrid(gridId, selClass) {
  const grid = document.getElementById(gridId);
  typeKeys.forEach(key => {
    const d = types[key];
    const btn = document.createElement('button');
    btn.className = 'type-btn';
    btn.dataset.key = key;
    btn.innerHTML = `
      <span class="tb-icon">${d.icon}</span>
      <span class="tb-name">${d.name}</span>
      <span class="tb-desc">${d.description.slice(0, 24)}…</span>
    `;
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      if (gridId === 'grid1') sel1 = key;
      else sel2 = key;
      if (sel1 && sel2) showResult();
    });
    grid.appendChild(btn);
  });
}

function showResult() {
  const score = getCompat(sel1, sel2);
  const d1 = types[sel1], d2 = types[sel2];
  const hm = heartMap[score];

  document.getElementById('crIcon1').textContent = d1.icon;
  document.getElementById('crName1').textContent = d1.name;
  document.getElementById('crIcon2').textContent = d2.icon;
  document.getElementById('crName2').textContent = d2.name;
  document.getElementById('crHearts').textContent = hm.hearts;
  document.getElementById('crLabel').textContent = hm.label;
  document.getElementById('crComment').textContent = getCompatComment(score);

  const res = document.getElementById('compatResult');
  res.classList.remove('show');
  void res.offsetWidth; // reflow for re-animation
  res.classList.add('show');
  res.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

buildGrid('grid1');
buildGrid('grid2');

// もし診断結果があれば自分のタイプを自動選択
const savedScores = JSON.parse(localStorage.getItem('nightTypeScores'));
if (savedScores) {
  const myType = Object.keys(savedScores).reduce((a, b) => savedScores[a] > savedScores[b] ? a : b);
  const btn = document.querySelector(`#grid1 [data-key="${myType}"]`);
  if (btn) { btn.click(); }
}
</script>
<script src="./common.js"></script>
</body>
</html>
