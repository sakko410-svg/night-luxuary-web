<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>キャラ一覧｜NightType</title>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    .chars-grid {
      display:grid; grid-template-columns:repeat(2,1fr); gap:14px;
      padding:0 0 40px;
    }
    .char-card {
      border-radius:18px; background:var(--surface); border:1px solid var(--border);
      overflow:hidden; cursor:pointer; transition:all 0.25s;
      text-decoration:none; color:var(--white);
      display:block;
    }
    .char-card:hover {
      transform:translateY(-4px);
      box-shadow:0 12px 36px rgba(124,58,237,0.35);
      border-color:var(--purple-l);
    }
    .char-card.active-card { border-color:var(--pink); box-shadow:0 0 24px rgba(236,72,153,0.3); }
    .char-img-wrap {
      width:100%; aspect-ratio:1/1; overflow:hidden;
      background:radial-gradient(circle at 50% 60%, rgba(124,58,237,0.18), rgba(10,10,15,0.9));
      display:flex; align-items:center; justify-content:center;
      position:relative;
    }
    .char-img-wrap img { width:100%; height:100%; object-fit:cover; }
    .char-img-wrap .char-icon-fallback { font-size:4rem; }
    .char-type-code {
      position:absolute; top:8px; left:8px;
      background:rgba(10,10,15,0.7); backdrop-filter:blur(8px);
      border:1px solid var(--border); border-radius:8px;
      font-family:'Syne',sans-serif; font-size:0.6rem; font-weight:700;
      color:var(--purple-ll); padding:3px 8px; letter-spacing:0.1em;
    }
    .char-info { padding:12px 14px 14px; }
    .char-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.82rem; margin-bottom:5px; line-height:1.3; }
    .char-desc { font-size:0.68rem; color:var(--muted); line-height:1.6; }

    /* モーダル */
    .modal-overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
      display:flex; align-items:flex-end; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      width:100%; max-width:480px;
      background:var(--surface); border-radius:24px 24px 0 0;
      border:1px solid var(--border); border-bottom:none;
      padding:0 0 40px;
      transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
      max-height:90vh; overflow-y:auto;
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; border-radius:2px; background:rgba(255,255,255,0.15); margin:14px auto 0; }
    .modal-img { width:100%; max-height:280px; object-fit:contain; padding:20px 40px 0; }
    .modal-img-fallback { font-size:6rem; text-align:center; padding:28px 0 0; }
    .modal-body { padding:20px 22px 0; }
    .modal-code { font-size:0.58rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--purple-ll); margin-bottom:6px; }
    .modal-name { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; margin-bottom:4px;
      background:linear-gradient(135deg,var(--purple-ll),var(--pink-l));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .modal-desc { font-size:0.85rem; line-height:1.85; color:#9d99b0; margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.05); }
    .modal-compat { margin-top:18px; }
    .modal-compat-title { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:10px; }
    .modal-compat-title.g { color:rgba(168,85,247,0.7); }
    .modal-compat-title.b { color:rgba(236,72,153,0.7); }
    .modal-compat-list { display:flex; flex-wrap:wrap; gap:8px; }
    .modal-compat-chip {
      display:flex; align-items:center; gap:6px;
      padding:6px 12px; border-radius:999px; font-size:0.72rem;
    }
    .modal-compat-chip.good { background:rgba(124,58,237,0.15); border:1px solid rgba(168,85,247,0.3); color:var(--purple-ll); }
    .modal-compat-chip.bad  { background:rgba(236,72,153,0.1);  border:1px solid rgba(236,72,153,0.3);  color:var(--pink-l); }
    .modal-compat-chip img  { width:22px; height:22px; border-radius:6px; object-fit:cover; }
    .modal-close { width:calc(100% - 44px); margin:22px 22px 0; padding:14px; border-radius:12px;
      background:transparent; border:1px solid var(--border); color:var(--muted);
      font-family:'Syne',sans-serif; font-size:0.75rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s; }
    .modal-close:hover { border-color:var(--purple-l); color:var(--white); }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="noise"></div>
<nav class="navbar">
  <a href="index.html" class="nav-logo">NightType</a>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html" class="active"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<div class="page">
  <div style="max-width:480px;margin:0 auto;padding:24px 16px 0;">
    <div class="page-header">
      <h1>キャラ一覧</h1>
      <p>タップして詳細を見る</p>
    </div>
    <div class="chars-grid" id="charsGrid"></div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
    <button class="modal-close" id="modalClose">閉じる</button>
  </div>
</div>

<script src="./types.js"></script>
<script src="./common.js"></script>
<script>
const grid = document.getElementById('charsGrid');
const overlay = document.getElementById('modalOverlay');
const modalContent = document.getElementById('modalContent');

Object.entries(types).forEach(([code, d], i) => {
  const card = document.createElement('a');
  card.id = code;
  card.className = 'char-card';
  card.href = '#'+code;
  card.style.cssText = `opacity:0;animation:popIn 0.5s ease ${0.05*i}s forwards`;
  card.innerHTML = `
    <div class="char-img-wrap">
      ${d.image ? `<img src="${d.image}" alt="${d.name}" loading="lazy"/>` : `<div class="char-icon-fallback">${d.icon}</div>`}
      <div class="char-type-code">${code}</div>
    </div>
    <div class="char-info">
      <div class="char-name">${d.name}</div>
      <div class="char-desc">${d.description.slice(0,36)}…</div>
    </div>`;
  card.addEventListener('click', e => { e.preventDefault(); openModal(code); });
  grid.appendChild(card);
});

// ハッシュで自動オープン
if(location.hash){
  const code = location.hash.slice(1);
  if(types[code]) setTimeout(()=>openModal(code), 400);
}

function openModal(code){
  const d = types[code];
  const goodChips = d.good.map(c=>`
    <div class="modal-compat-chip good">
      ${types[c].image ? `<img src="${types[c].image}" alt="">` : types[c].icon}
      ${types[c].name}
    </div>`).join('');
  const badChips = d.bad.map(c=>`
    <div class="modal-compat-chip bad">
      ${types[c].image ? `<img src="${types[c].image}" alt="">` : types[c].icon}
      ${types[c].name}
    </div>`).join('');
  modalContent.innerHTML = `
    ${d.image ? `<img class="modal-img" src="${d.image}" alt="${d.name}"/>` : `<div class="modal-img-fallback">${d.icon}</div>`}
    <div class="modal-body">
      <div class="modal-code">${code}</div>
      <div class="modal-name">${d.name}</div>
      <p class="modal-desc">${d.description}</p>
      <div class="modal-compat">
        <div class="modal-compat-title g">◇ 相性がいいタイプ</div>
        <div class="modal-compat-list">${goodChips}</div>
      </div>
      <div class="modal-compat" style="margin-top:14px">
        <div class="modal-compat-title b">◇ 刺激が強すぎるタイプ</div>
        <div class="modal-compat-list">${badChips}</div>
      </div>
    </div>`;
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
}
</script>
</body>
</html>
